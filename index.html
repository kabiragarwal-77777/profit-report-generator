<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Report Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;1,400;1,700;1,800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
  .app { display: flex; height: 100vh; }

  /* LEFT PANEL */
  .panel { width: 420px; min-width: 380px; background: #161922; border-right: 1px solid #2a2d3a; display: flex; flex-direction: column; }
  .panel-header { padding: 20px 24px 12px; border-bottom: 1px solid #2a2d3a; }
  .panel-header h1 { font-size: 18px; color: #4aeabc; font-weight: 700; }
  .panel-header p { font-size: 12px; color: #888; margin-top: 4px; }
  .panel-body { padding: 16px 24px; flex: 1; overflow-y: auto; }

  label { display: block; font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  textarea { width: 100%; background: #1e2130; border: 1px solid #2e3148; border-radius: 8px; color: #e0e0e0; font-family: 'Consolas', monospace; font-size: 13px; padding: 12px; resize: vertical; outline: none; }
  textarea:focus { border-color: #4aeabc; }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .control-group { display: flex; flex-direction: column; }
  .control-group.full { grid-column: 1 / -1; }
  input[type="text"], select { width: 100%; background: #1e2130; border: 1px solid #2e3148; border-radius: 6px; color: #e0e0e0; font-size: 13px; padding: 8px 10px; outline: none; }
  input:focus, select:focus { border-color: #4aeabc; }

  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: #4aeabc; color: #0f1117; }
  .btn-primary:hover { background: #3cd4a8; }
  .btn-download { background: #2a2d3a; color: #4aeabc; border: 1px solid #4aeabc; }
  .btn-download:hover { background: #4aeabc22; }
  .actions { display: flex; gap: 10px; margin-top: 20px; }
  .actions .btn { flex: 1; }

  input[type="range"] { width: 100%; accent-color: #4aeabc; }
  .range-val { font-size: 11px; color: #4aeabc; text-align: right; margin-top: 2px; }

  /* RIGHT — PREVIEW */
  .preview-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 30px; background: #0b0d12; }

  /* ════════ THE CARD ════════ */
  .card {
    width: 600px;
    background: url('bg.jpg') center / 100% 100% no-repeat;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  /* Dark overlays to hide baked-in SEBI (top) and disclaimer (bottom) from bg image */
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 6%;
    background: linear-gradient(to bottom, #070a0e 40%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }
  .card::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 6%;
    background: linear-gradient(to top, #081210 40%, transparent 100%);
    z-index: 1;
    pointer-events: none;
  }

  /* Inner wrapper with padding — all content sits above the overlays */
  .card-inner {
    position: relative;
    z-index: 2;
    padding: 24px 30px 18px;
  }

  /* SEBI */
  .card-sebi {
    text-align: right;
    font-size: 13px;
    font-weight: 700;
    color: #d4c97a;
    margin-bottom: 6px;
  }

  /* TITLE */
  .card-title {
    text-align: left;
    margin: 4px 0 18px 2px;
    line-height: 1.05;
    white-space: nowrap;
  }
  .card-title .t-green {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 800;
    color: #4aeabc;
  }
  .card-title .t-white {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    color: #ffffffdd;
  }

  /* SECTION LABEL */
  .card-section {
    text-align: center;
    font-weight: 600;
    letter-spacing: 2.5px;
    color: rgba(255,255,255,.7);
    text-transform: uppercase;
  }

  /* TABLE — fixed column widths for alignment */
  .card-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  .card-table col.c-name    { width: 35%; }
  .card-table col.c-returns { width: 35%; }
  .card-table col.c-dur     { width: 30%; }

  .card-table thead th {
    font-weight: 700;
    letter-spacing: 1.2px;
    color: #d4c97a;
    text-transform: uppercase;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,.4);
    border-bottom: 1px solid rgba(255,255,255,.4);
    border-right: 1px solid rgba(255,255,255,.2);
  }
  .card-table thead th:last-child { border-right: none; }

  .card-table tbody td {
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,.22);
    border-right: 1px solid rgba(255,255,255,.2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-table tbody td:last-child { border-right: none; }
  .card-table tbody tr:last-child td {
    border-bottom: 1px solid rgba(255,255,255,.4);
  }

  /* Outer table border (left + right) */
  .card-table { border-left: 1px solid rgba(255,255,255,.4); border-right: 1px solid rgba(255,255,255,.4); }

  .td-name     { color: rgba(255,255,255,.8); }
  .td-returns  { color: #4aeabc; font-weight: 700; }
  .td-duration { color: rgba(255,255,255,.8); }

  /* DISCLAIMER */
  .card-disclaimer {
    font-size: 7.5px;
    color: rgba(200,195,160,.45);
    line-height: 1.5;
    text-align: center;
    padding: 0 4px;
    margin-top: 16px;
  }

  @media (max-width: 900px) {
    .app { flex-direction: column; height: auto; }
    .panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid #2a2d3a; }
    .preview-area { min-height: 500px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="panel">
    <div class="panel-header">
      <h1>Profit Report Generator</h1>
      <p>Paste your trade data &amp; download the graphic</p>
    </div>
    <div class="panel-body">
      <label>Trade Data (paste here)</label>
      <textarea id="inputText" rows="14">Equity:
OIL: 3.33% in 5 Days
TATAINVEST: 2.02% in 1 Hour

Futures:
BEL26MARFUT: ₹8,193 in Same Day
NBCC26MARFUT: ₹7,605 in 1 Day
AUROPHARMA26MARFUT: ₹7,425 in Same Day
BEL26MARFUT: ₹7,410 in 1 Day
AMBER26MARFUT: ₹7,200 in Same Day

Options:
SENSEX: 32.33% in 8 Mins
BDL: 6.02% in 1 Day
BDL: 5.94% in 46 Mins
CANBK: 4.39% in 22 Mins
NIFTY 50: 2.93% in 57 Mins</textarea>

      <div class="controls">
        <div class="control-group full">
          <label>Card Width (px)</label>
          <input type="range" id="cardWidth" min="400" max="1000" value="600">
          <div class="range-val" id="cardWidthVal">600px</div>
        </div>
        <div class="control-group">
          <label>Table Font Size</label>
          <select id="fontSize">
            <option value="11">Small</option>
            <option value="13" selected>Default</option>
            <option value="15">Large</option>
            <option value="17">Extra Large</option>
          </select>
        </div>
        <div class="control-group">
          <label>Title Size</label>
          <select id="titleSize">
            <option value="36">Small</option>
            <option value="42">Medium</option>
            <option value="48" selected>Default</option>
            <option value="56">Large</option>
          </select>
        </div>
        <div class="control-group">
          <label>Row Padding</label>
          <select id="rowPadding">
            <option value="4">Compact</option>
            <option value="7" selected>Normal</option>
            <option value="11">Spacious</option>
            <option value="15">Extra Spacious</option>
          </select>
        </div>
        <div class="control-group">
          <label>Section Spacing</label>
          <select id="tableGap">
            <option value="8">Tight</option>
            <option value="14" selected>Normal</option>
            <option value="24">Wide</option>
          </select>
        </div>
        <div class="control-group full">
          <label>SEBI Registration</label>
          <input type="text" id="sebiReg" value="INH000013776">
        </div>
        <div class="control-group full">
          <label>Disclaimer</label>
          <textarea id="disclaimer" rows="3" style="font-family:'Segoe UI',sans-serif;font-size:11px;">Investment in securities market are subject to market risks. Read all the related documents carefully before investing. The securities quoted are for illustration only and are not recommendatory. The information provided is intended for educational purposes only, for further disclosures, visit https://univest.in / Univest App.</textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="generate()">Generate</button>
        <button class="btn btn-download" onclick="download()">Download PNG</button>
      </div>
    </div>
  </div>

  <div class="preview-area">
    <div class="card" id="card">
      <div class="card-inner" id="cardInner">
        <div class="card-sebi" id="sebiLine">SEBI Reg. : INH000013776</div>
        <div class="card-title" id="titleBlock"></div>
        <div id="tablesContainer"></div>
        <div class="card-disclaimer" id="disclaimerDisplay"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function parseInput(text) {
  const sections = [];
  let cur = null;
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;
    if (/^(Equity|Futures|Options|Commodity)\s*:/i.test(line)) {
      cur = { name: line.replace(/\s*:\s*$/, '').toUpperCase(), rows: [] };
      sections.push(cur);
      continue;
    }
    if (!cur) continue;
    const m = line.match(/^(.+?):\s*(.+?)\s+in\s+(.+)$/i);
    if (m) cur.rows.push({ name: m[1].trim(), returns: m[2].trim(), duration: m[3].trim() });
  }
  return sections;
}

const COL_HEADERS = {
  'EQUITY':    ['STOCK NAME', 'RETURNS',          'DURATION'],
  'FUTURES':   ['STOCK NAME', 'RETURNS/LOT',      'DURATION'],
  'OPTIONS':   ['STOCK NAME', 'RETURNS/STRATEGY', 'DURATION'],
  'COMMODITY': ['STOCK NAME', 'RETURNS',          'DURATION'],
};

function generate() {
  const text     = document.getElementById('inputText').value;
  const sections = parseInput(text);
  const cardW    = parseInt(document.getElementById('cardWidth').value);
  let   fSize    = parseInt(document.getElementById('fontSize').value);
  let   tSize    = parseInt(document.getElementById('titleSize').value);
  let   rPad     = parseInt(document.getElementById('rowPadding').value);
  let   tGap     = parseInt(document.getElementById('tableGap').value);
  const sebi     = document.getElementById('sebiReg').value;
  const disc     = document.getElementById('disclaimer').value;

  const card = document.getElementById('card');
  card.style.width = cardW + 'px';

  // Count total trades
  const total = sections.reduce((s, sec) => s + sec.rows.length, 0);

  // Auto-scale: if many trades, shrink sizes proportionally
  // Base: 12 trades fits comfortably. Scale down for more.
  const scale = total <= 12 ? 1 : Math.max(0.55, 12 / total);
  if (scale < 1) {
    fSize  = Math.max(9, Math.round(fSize * scale));
    tSize  = Math.max(24, Math.round(tSize * scale));
    rPad   = Math.max(2, Math.round(rPad * scale));
    tGap   = Math.max(4, Math.round(tGap * scale));
  }

  // SEBI
  document.getElementById('sebiLine').textContent = 'SEBI Reg. : ' + sebi;

  // Title
  const titleBlock = document.getElementById('titleBlock');
  titleBlock.innerHTML =
    '<span class="t-green" style="font-size:' + tSize + 'px">' + total + ' Profits </span>' +
    '<span class="t-white" style="font-size:' + tSize + 'px">Booked Today</span>';

  // Disclaimer
  document.getElementById('disclaimerDisplay').textContent = disc;

  // Tables
  const container = document.getElementById('tablesContainer');
  container.innerHTML = '';

  const hFontSize = Math.max(8, fSize - 2);

  for (const sec of sections) {
    // Section label
    const label = document.createElement('div');
    label.className = 'card-section';
    label.style.marginTop = tGap + 'px';
    label.style.marginBottom = Math.max(3, Math.round(tGap * 0.4)) + 'px';
    label.style.fontSize = Math.max(9, fSize - 1) + 'px';
    label.textContent = sec.name;
    container.appendChild(label);

    // Table
    const headers = COL_HEADERS[sec.name] || COL_HEADERS['EQUITY'];
    const table = document.createElement('table');
    table.className = 'card-table';

    // Colgroup for fixed widths
    const colgroup = document.createElement('colgroup');
    ['c-name','c-returns','c-dur'].forEach(cls => {
      const col = document.createElement('col');
      col.className = cls;
      colgroup.appendChild(col);
    });
    table.appendChild(colgroup);

    // Thead
    const thead = document.createElement('thead');
    const htr = document.createElement('tr');
    headers.forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      th.style.fontSize = hFontSize + 'px';
      th.style.padding = Math.max(3, rPad) + 'px 8px';
      htr.appendChild(th);
    });
    thead.appendChild(htr);
    table.appendChild(thead);

    // Tbody
    const tbody = document.createElement('tbody');
    for (const row of sec.rows) {
      const tr = document.createElement('tr');
      const tdN = document.createElement('td'); tdN.className = 'td-name';     tdN.textContent = row.name;
      const tdR = document.createElement('td'); tdR.className = 'td-returns';  tdR.textContent = row.returns;
      const tdD = document.createElement('td'); tdD.className = 'td-duration'; tdD.textContent = row.duration;
      [tdN, tdR, tdD].forEach(td => {
        td.style.fontSize = fSize + 'px';
        td.style.padding = rPad + 'px 8px';
      });
      tr.append(tdN, tdR, tdD);
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    container.appendChild(table);
  }
}

function download() {
  html2canvas(document.getElementById('card'), {
    scale: 2, backgroundColor: null, useCORS: true
  }).then(canvas => {
    const a = document.createElement('a');
    a.download = 'profit-report.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

// Live updates
document.getElementById('cardWidth').addEventListener('input', function () {
  document.getElementById('cardWidthVal').textContent = this.value + 'px';
  generate();
});
['fontSize','titleSize','rowPadding','tableGap','sebiReg'].forEach(id => {
  document.getElementById(id).addEventListener('change', generate);
});
document.getElementById('inputText').addEventListener('input', generate);
document.getElementById('disclaimer').addEventListener('input', generate);

// Generate on load
window.addEventListener('DOMContentLoaded', generate);
</script>
</body>
</html>
