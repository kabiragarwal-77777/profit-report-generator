<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Report Generator</title>
<style>
  /* ─── PORTAL UI ─── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

  .app { display: flex; height: 100vh; }

  /* LEFT PANEL */
  .panel { width: 420px; min-width: 380px; background: #161922; border-right: 1px solid #2a2d3a; display: flex; flex-direction: column; overflow-y: auto; }
  .panel-header { padding: 20px 24px 12px; border-bottom: 1px solid #2a2d3a; }
  .panel-header h1 { font-size: 18px; color: #4aeabc; font-weight: 700; }
  .panel-header p { font-size: 12px; color: #888; margin-top: 4px; }

  .panel-body { padding: 16px 24px; flex: 1; overflow-y: auto; }

  label { display: block; font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  textarea { width: 100%; background: #1e2130; border: 1px solid #2e3148; border-radius: 8px; color: #e0e0e0; font-family: 'Consolas', monospace; font-size: 13px; padding: 12px; resize: vertical; outline: none; transition: border-color .2s; }
  textarea:focus { border-color: #4aeabc; }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .control-group { display: flex; flex-direction: column; }
  .control-group.full { grid-column: 1 / -1; }
  input[type="number"], input[type="text"], select { width: 100%; background: #1e2130; border: 1px solid #2e3148; border-radius: 6px; color: #e0e0e0; font-size: 13px; padding: 8px 10px; outline: none; }
  input:focus, select:focus { border-color: #4aeabc; }

  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: #4aeabc; color: #0f1117; }
  .btn-primary:hover { background: #3cd4a8; }
  .btn-download { background: #2a2d3a; color: #4aeabc; border: 1px solid #4aeabc; }
  .btn-download:hover { background: #4aeabc22; }
  .actions { display: flex; gap: 10px; margin-top: 20px; }
  .actions .btn { flex: 1; }

  /* Slider */
  input[type="range"] { width: 100%; accent-color: #4aeabc; }
  .range-val { font-size: 11px; color: #4aeabc; text-align: right; margin-top: 2px; }

  /* RIGHT — PREVIEW */
  .preview-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 30px; background: #0b0d12; }
  .preview-wrapper { position: relative; }

  /* ─── CARD (the generated image) ─── */
  .card {
    width: 600px;
    background: radial-gradient(ellipse at 10% 50%, #0e2e2a 0%, #0c1a1e 40%, #0a0f14 100%);
    padding: 32px 36px 24px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  /* subtle glow on left edge */
  .card::before {
    content: '';
    position: absolute;
    left: -60px; top: 20%; width: 180px; height: 60%;
    background: radial-gradient(ellipse, rgba(74,234,188,.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .sebi { text-align: right; font-size: 11px; color: #ccc; margin-bottom: 8px; font-weight: 600; }

  .title { text-align: center; margin-bottom: 24px; }
  .title .count { font-size: 42px; font-weight: 800; font-style: italic; }
  .title .count .green { color: #4aeabc; }
  .title .count .white { color: #fff; }
  .title .sub { font-size: 42px; font-weight: 300; font-style: italic; color: #ffffffcc; }

  .section-label { text-align: center; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #ffffffcc; margin: 18px 0 6px; text-transform: uppercase; }

  table { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
  table thead th {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; color: #ffffffaa;
    padding: 7px 10px; text-transform: uppercase;
    border-bottom: 1px solid #ffffff22;
  }
  table tbody td {
    padding: 6px 10px; font-size: 13px; border-bottom: 1px solid #ffffff0d;
  }
  table tbody td:first-child { color: #ccc; }
  table tbody td:nth-child(2) { color: #4aeabc; font-weight: 700; text-align: center; }
  table tbody td:nth-child(3) { color: #ccc; text-align: center; }
  table thead th:first-child { text-align: left; }
  table thead th:nth-child(2) { text-align: center; }
  table thead th:nth-child(3) { text-align: center; }

  .disclaimer {
    margin-top: 20px; font-size: 8px; color: #ffffff55; line-height: 1.4; text-align: center;
  }

  /* Responsive scaling */
  @media (max-width: 900px) {
    .app { flex-direction: column; height: auto; }
    .panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid #2a2d3a; }
    .preview-area { min-height: 500px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="panel-header">
      <h1>Profit Report Generator</h1>
      <p>Paste your trade data &amp; download the graphic</p>
    </div>
    <div class="panel-body">
      <label>Trade Data (paste here)</label>
      <textarea id="inputText" rows="14" placeholder="Equity:
APOLLOHOSP: 7.45% in 60 days
ZFCVINDIA: 5.72% in 39 days

Futures:
SONACOMS26FEBFUT: ₹7,411.25 in 2 days

Options:
NESTLEIND: 8.12% in 1 day

Commodity:
CRUDEOIL26FEBFUT: 2.04% in 1 day"></textarea>

      <div class="controls">
        <div class="control-group full">
          <label>Card Width (px)</label>
          <input type="range" id="cardWidth" min="400" max="1000" value="600">
          <div class="range-val" id="cardWidthVal">600px</div>
        </div>

        <div class="control-group">
          <label>Font Size</label>
          <select id="fontSize">
            <option value="11">Small</option>
            <option value="13" selected>Medium</option>
            <option value="15">Large</option>
            <option value="17">Extra Large</option>
          </select>
        </div>

        <div class="control-group">
          <label>Title Size</label>
          <select id="titleSize">
            <option value="34">Small</option>
            <option value="42" selected>Medium</option>
            <option value="52">Large</option>
          </select>
        </div>

        <div class="control-group">
          <label>Row Padding</label>
          <select id="rowPadding">
            <option value="4">Compact</option>
            <option value="6" selected>Normal</option>
            <option value="10">Spacious</option>
            <option value="14">Extra Spacious</option>
          </select>
        </div>

        <div class="control-group">
          <label>Table Spacing</label>
          <select id="tableGap">
            <option value="12">Tight</option>
            <option value="18" selected>Normal</option>
            <option value="28">Wide</option>
          </select>
        </div>

        <div class="control-group full">
          <label>SEBI Registration</label>
          <input type="text" id="sebiReg" value="INH000013776">
        </div>

        <div class="control-group full">
          <label>Disclaimer</label>
          <textarea id="disclaimer" rows="3" style="font-family:'Segoe UI',sans-serif;font-size:11px;">Investment in securities market are subject to market risks. Read all the related documents carefully before investing. The securities quoted are for illustration only and are not recommendatory. The information provided is intended for educational purposes only, for further disclosures, visit https://univest.in / Univest App.</textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="generate()">Generate</button>
        <button class="btn btn-download" onclick="download()">Download PNG</button>
      </div>
    </div>
  </div>

  <!-- RIGHT — PREVIEW -->
  <div class="preview-area">
    <div class="preview-wrapper">
      <div class="card" id="card">
        <div class="sebi">SEBI Reg. : <span id="sebiDisplay">INH000013776</span></div>
        <div class="title">
          <span class="count"><span class="green" id="profitCount">0</span> <span class="green">Profits</span> <span class="sub">Booked Today</span></span>
        </div>
        <div id="tablesContainer"></div>
        <div class="disclaimer" id="disclaimerDisplay"></div>
      </div>
    </div>
  </div>
</div>

<!-- html2canvas CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
// ─── PARSER ───
function parseInput(text) {
  const sections = [];
  let currentSection = null;

  for (let raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;

    // Section header — ends with colon, no other colon before it (or the part before first colon has no digits/₹)
    if (/^(Equity|Futures|Options|Commodity)\s*:/i.test(line)) {
      currentSection = { name: line.replace(/\s*:\s*$/, '').toUpperCase(), rows: [] };
      sections.push(currentSection);
      continue;
    }

    if (!currentSection) continue;

    // Row: NAME: VALUE in DURATION
    const m = line.match(/^(.+?):\s*(.+?)\s+in\s+(.+)$/i);
    if (m) {
      currentSection.rows.push({ name: m[1].trim(), returns: m[2].trim(), duration: m[3].trim() });
    }
  }
  return sections;
}

// ─── RENDER ───
function generate() {
  const text = document.getElementById('inputText').value;
  const sections = parseInput(text);

  // Sizes from controls
  const cardW = document.getElementById('cardWidth').value;
  const fSize = document.getElementById('fontSize').value;
  const tSize = document.getElementById('titleSize').value;
  const rPad = document.getElementById('rowPadding').value;
  const tGap = document.getElementById('tableGap').value;
  const sebi = document.getElementById('sebiReg').value;
  const disc = document.getElementById('disclaimer').value;

  const card = document.getElementById('card');
  card.style.width = cardW + 'px';

  // Title
  let totalProfits = sections.reduce((s, sec) => s + sec.rows.length, 0);
  document.getElementById('profitCount').textContent = totalProfits;

  const titleEl = card.querySelector('.title .count');
  titleEl.style.fontSize = tSize + 'px';
  card.querySelector('.title .sub').style.fontSize = tSize + 'px';

  // SEBI
  document.getElementById('sebiDisplay').textContent = sebi;

  // Disclaimer
  document.getElementById('disclaimerDisplay').textContent = disc;

  // Build tables
  const container = document.getElementById('tablesContainer');
  container.innerHTML = '';

  const colHeaders = {
    'EQUITY':    ['STOCK NAME', 'RETURNS', 'DURATION'],
    'FUTURES':   ['STOCK NAME', 'RETURNS/LOT', 'DURATION'],
    'OPTIONS':   ['STOCK NAME', 'RETURNS/STRATEGY', 'DURATION'],
    'COMMODITY': ['STOCK NAME', 'RETURNS', 'DURATION'],
  };

  for (const sec of sections) {
    const label = document.createElement('div');
    label.className = 'section-label';
    label.style.marginTop = tGap + 'px';
    label.textContent = sec.name;
    container.appendChild(label);

    const headers = colHeaders[sec.name] || colHeaders['EQUITY'];

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>`;
    const tbody = document.createElement('tbody');

    for (const row of sec.rows) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${row.name}</td><td>${row.returns}</td><td>${row.duration}</td>`;
      tr.querySelectorAll('td').forEach(td => {
        td.style.fontSize = fSize + 'px';
        td.style.padding = `${rPad}px 10px`;
      });
      tbody.appendChild(tr);
    }

    table.appendChild(tbody);
    table.querySelectorAll('th').forEach(th => th.style.fontSize = (parseInt(fSize) - 2) + 'px');
    container.appendChild(table);
  }
}

// ─── DOWNLOAD ───
function download() {
  const card = document.getElementById('card');
  html2canvas(card, { scale: 2, backgroundColor: null, useCORS: true }).then(canvas => {
    const a = document.createElement('a');
    a.download = 'profit-report.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

// ─── LIVE CONTROLS ───
document.getElementById('cardWidth').addEventListener('input', function() {
  document.getElementById('cardWidthVal').textContent = this.value + 'px';
  generate();
});
['fontSize','titleSize','rowPadding','tableGap'].forEach(id => {
  document.getElementById(id).addEventListener('change', generate);
});

// Generate on load with placeholder
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('disclaimerDisplay').textContent = document.getElementById('disclaimer').value;
});
</script>
</body>
</html>
