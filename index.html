<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profit Report Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
  .app { display: flex; height: 100vh; }

  /* LEFT PANEL */
  .panel { width: 420px; min-width: 380px; background: #161922; border-right: 1px solid #2a2d3a; display: flex; flex-direction: column; overflow-y: auto; }
  .panel-header { padding: 20px 24px 12px; border-bottom: 1px solid #2a2d3a; }
  .panel-header h1 { font-size: 18px; color: #4aeabc; font-weight: 700; }
  .panel-header p { font-size: 12px; color: #888; margin-top: 4px; }
  .panel-body { padding: 16px 24px; flex: 1; overflow-y: auto; }

  label { display: block; font-size: 12px; font-weight: 600; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  textarea { width: 100%; background: #1e2130; border: 1px solid #2e3148; border-radius: 8px; color: #e0e0e0; font-family: 'Consolas', monospace; font-size: 13px; padding: 12px; resize: vertical; outline: none; transition: border-color .2s; }
  textarea:focus { border-color: #4aeabc; }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .control-group { display: flex; flex-direction: column; }
  .control-group.full { grid-column: 1 / -1; }
  input[type="number"], input[type="text"], select { width: 100%; background: #1e2130; border: 1px solid #2e3148; border-radius: 6px; color: #e0e0e0; font-size: 13px; padding: 8px 10px; outline: none; }
  input:focus, select:focus { border-color: #4aeabc; }

  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-primary { background: #4aeabc; color: #0f1117; }
  .btn-primary:hover { background: #3cd4a8; }
  .btn-download { background: #2a2d3a; color: #4aeabc; border: 1px solid #4aeabc; }
  .btn-download:hover { background: #4aeabc22; }
  .actions { display: flex; gap: 10px; margin-top: 20px; }
  .actions .btn { flex: 1; }

  input[type="range"] { width: 100%; accent-color: #4aeabc; }
  .range-val { font-size: 11px; color: #4aeabc; text-align: right; margin-top: 2px; }

  /* RIGHT — PREVIEW */
  .preview-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; padding: 30px; background: #0b0d12; }

  /* ═══════════════════════════════════════════
     CARD — the generated report image
     ═══════════════════════════════════════════ */
  .card {
    width: 600px;
    background: radial-gradient(ellipse at 0% 50%, #0d2b27 0%, #0b1a1d 35%, #090e13 70%, #070a0f 100%);
    padding: 28px 32px 22px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  /* left edge teal glow */
  .card::before {
    content: '';
    position: absolute;
    left: -80px; top: 10%; width: 200px; height: 80%;
    background: radial-gradient(ellipse, rgba(50,180,140,.15) 0%, transparent 70%);
    pointer-events: none;
  }
  /* bottom edge glow */
  .card::after {
    content: '';
    position: absolute;
    left: -40px; bottom: -60px; width: 200px; height: 200px;
    background: radial-gradient(ellipse, rgba(50,180,140,.10) 0%, transparent 70%);
    pointer-events: none;
  }

  /* SEBI REG — top right */
  .sebi {
    text-align: right;
    font-size: 12px;
    color: #fff;
    font-weight: 700;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }

  /* TITLE — "12 Profits Booked Today" */
  .title {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
  }
  .title-number {
    font-size: 46px;
    font-weight: 800;
    font-style: italic;
    color: #4aeabc;
  }
  .title-profits {
    font-size: 46px;
    font-weight: 800;
    font-style: italic;
    color: #4aeabc;
  }
  .title-booked {
    font-size: 46px;
    font-weight: 300;
    font-style: italic;
    color: #ffffffdd;
  }

  /* SECTION HEADERS — "EQUITY", "FUTURES", etc */
  .section-label {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #ffffffcc;
    margin: 20px 0 8px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  /* TABLES */
  .report-table {
    width: 100%;
    border-collapse: collapse;
    position: relative;
    z-index: 1;
    border-left: 1px solid #ffffff30;
    border-right: 1px solid #ffffff30;
  }
  .report-table thead th {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #ffffffdd;
    padding: 10px 16px;
    text-transform: uppercase;
    text-align: center;
    border-top: 1.5px solid #ffffff44;
    border-bottom: 1.5px solid #ffffff44;
    border-right: 1px solid #ffffff20;
    background: rgba(255,255,255,0.03);
  }
  .report-table thead th:last-child { border-right: none; }

  .report-table tbody td {
    padding: 9px 16px;
    font-size: 14px;
    text-align: center;
    border-bottom: 1px solid #ffffff20;
    border-right: 1px solid #ffffff20;
  }
  .report-table tbody td:last-child { border-right: none; }
  .report-table tbody tr:last-child td { border-bottom: 1.5px solid #ffffff44; }

  /* Column styles */
  .report-table tbody td.col-name { color: #ddd; font-weight: 400; }
  .report-table tbody td.col-returns { color: #4aeabc; font-weight: 700; }
  .report-table tbody td.col-duration { color: #ddd; font-weight: 400; }

  /* DISCLAIMER */
  .disclaimer {
    margin-top: 22px;
    font-size: 8.5px;
    color: #ffffff44;
    line-height: 1.5;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  @media (max-width: 900px) {
    .app { flex-direction: column; height: auto; }
    .panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid #2a2d3a; }
    .preview-area { min-height: 500px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- LEFT PANEL -->
  <div class="panel">
    <div class="panel-header">
      <h1>Profit Report Generator</h1>
      <p>Paste your trade data &amp; download the graphic</p>
    </div>
    <div class="panel-body">
      <label>Trade Data (paste here)</label>
      <textarea id="inputText" rows="14" placeholder="Equity:
APOLLOHOSP: 7.45% in 60 days
ZFCVINDIA: 5.72% in 39 days

Futures:
SONACOMS26FEBFUT: ₹7,411.25 in 2 days

Options:
NESTLEIND: 8.12% in 1 day

Commodity:
CRUDEOIL26FEBFUT: 2.04% in 1 day"></textarea>

      <div class="controls">
        <div class="control-group full">
          <label>Card Width (px)</label>
          <input type="range" id="cardWidth" min="400" max="1000" value="600">
          <div class="range-val" id="cardWidthVal">600px</div>
        </div>

        <div class="control-group">
          <label>Table Font Size</label>
          <select id="fontSize">
            <option value="11">Small</option>
            <option value="13">Medium</option>
            <option value="14" selected>Default</option>
            <option value="16">Large</option>
            <option value="18">Extra Large</option>
          </select>
        </div>

        <div class="control-group">
          <label>Title Size</label>
          <select id="titleSize">
            <option value="34">Small</option>
            <option value="42">Medium</option>
            <option value="46" selected>Default</option>
            <option value="54">Large</option>
          </select>
        </div>

        <div class="control-group">
          <label>Row Padding</label>
          <select id="rowPadding">
            <option value="5">Compact</option>
            <option value="9" selected>Normal</option>
            <option value="13">Spacious</option>
            <option value="17">Extra Spacious</option>
          </select>
        </div>

        <div class="control-group">
          <label>Section Spacing</label>
          <select id="tableGap">
            <option value="12">Tight</option>
            <option value="20" selected>Normal</option>
            <option value="30">Wide</option>
          </select>
        </div>

        <div class="control-group full">
          <label>SEBI Registration</label>
          <input type="text" id="sebiReg" value="INH000013776">
        </div>

        <div class="control-group full">
          <label>Disclaimer</label>
          <textarea id="disclaimer" rows="3" style="font-family:'Segoe UI',sans-serif;font-size:11px;">Investment in securities market are subject to market risks. Read all the related documents carefully before investing. The securities quoted are for illustration only and are not recommendatory. The information provided is intended for educational purposes only, for further disclosures, visit https://univest.in / Univest App.</textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="generate()">Generate</button>
        <button class="btn btn-download" onclick="download()">Download PNG</button>
      </div>
    </div>
  </div>

  <!-- RIGHT — PREVIEW -->
  <div class="preview-area">
    <div class="card" id="card">
      <!-- SEBI -->
      <div class="sebi" id="sebiLine">SEBI Reg. : INH000013776</div>

      <!-- TITLE -->
      <div class="title">
        <span class="title-number" id="profitCount">0</span>
        <span class="title-profits"> Profits </span>
        <span class="title-booked">Booked Today</span>
      </div>

      <!-- TABLES -->
      <div id="tablesContainer"></div>

      <!-- DISCLAIMER -->
      <div class="disclaimer" id="disclaimerDisplay"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
/* ─── PARSER ─── */
function parseInput(text) {
  const sections = [];
  let cur = null;
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line) continue;
    if (/^(Equity|Futures|Options|Commodity)\s*:/i.test(line)) {
      cur = { name: line.replace(/\s*:\s*$/, '').toUpperCase(), rows: [] };
      sections.push(cur);
      continue;
    }
    if (!cur) continue;
    const m = line.match(/^(.+?):\s*(.+?)\s+in\s+(.+)$/i);
    if (m) cur.rows.push({ name: m[1].trim(), returns: m[2].trim(), duration: m[3].trim() });
  }
  return sections;
}

/* ─── COLUMN HEADERS PER SECTION ─── */
const COL_HEADERS = {
  'EQUITY':    ['STOCK NAME', 'RETURNS',          'DURATION'],
  'FUTURES':   ['STOCK NAME', 'RETURNS/LOT',      'DURATION'],
  'OPTIONS':   ['STOCK NAME', 'RETURNS/STRATEGY', 'DURATION'],
  'COMMODITY': ['STOCK NAME', 'RETURNS',          'DURATION'],
};

/* ─── GENERATE ─── */
function generate() {
  const text  = document.getElementById('inputText').value;
  const sections = parseInput(text);

  const cardW = document.getElementById('cardWidth').value;
  const fSize = document.getElementById('fontSize').value;
  const tSize = document.getElementById('titleSize').value;
  const rPad  = document.getElementById('rowPadding').value;
  const tGap  = document.getElementById('tableGap').value;
  const sebi  = document.getElementById('sebiReg').value;
  const disc  = document.getElementById('disclaimer').value;

  const card = document.getElementById('card');
  card.style.width = cardW + 'px';

  // SEBI
  document.getElementById('sebiLine').textContent = 'SEBI Reg. : ' + sebi;

  // Title — count total trades
  const total = sections.reduce((s, sec) => s + sec.rows.length, 0);
  document.getElementById('profitCount').textContent = total;

  // Title size
  document.querySelectorAll('.title-number, .title-profits, .title-booked').forEach(el => {
    el.style.fontSize = tSize + 'px';
  });

  // Disclaimer
  document.getElementById('disclaimerDisplay').textContent = disc;

  // Build tables
  const container = document.getElementById('tablesContainer');
  container.innerHTML = '';

  for (const sec of sections) {
    // Section label
    const label = document.createElement('div');
    label.className = 'section-label';
    label.style.marginTop = tGap + 'px';
    label.textContent = sec.name;
    container.appendChild(label);

    // Table
    const headers = COL_HEADERS[sec.name] || COL_HEADERS['EQUITY'];
    const table = document.createElement('table');
    table.className = 'report-table';

    // Header
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    headers.forEach(h => {
      const th = document.createElement('th');
      th.textContent = h;
      th.style.fontSize = (parseInt(fSize) - 1) + 'px';
      headRow.appendChild(th);
    });
    thead.appendChild(headRow);
    table.appendChild(thead);

    // Body
    const tbody = document.createElement('tbody');
    for (const row of sec.rows) {
      const tr = document.createElement('tr');

      const tdName = document.createElement('td');
      tdName.className = 'col-name';
      tdName.textContent = row.name;

      const tdRet = document.createElement('td');
      tdRet.className = 'col-returns';
      tdRet.textContent = row.returns;

      const tdDur = document.createElement('td');
      tdDur.className = 'col-duration';
      tdDur.textContent = row.duration;

      [tdName, tdRet, tdDur].forEach(td => {
        td.style.fontSize = fSize + 'px';
        td.style.padding = rPad + 'px 16px';
      });

      tr.append(tdName, tdRet, tdDur);
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    container.appendChild(table);
  }
}

/* ─── DOWNLOAD ─── */
function download() {
  const card = document.getElementById('card');
  html2canvas(card, { scale: 2, backgroundColor: null, useCORS: true }).then(canvas => {
    const a = document.createElement('a');
    a.download = 'profit-report.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

/* ─── LIVE CONTROLS ─── */
document.getElementById('cardWidth').addEventListener('input', function () {
  document.getElementById('cardWidthVal').textContent = this.value + 'px';
  generate();
});
['fontSize','titleSize','rowPadding','tableGap','sebiReg'].forEach(id => {
  document.getElementById(id).addEventListener('change', generate);
});
// Auto-generate on text paste / input
document.getElementById('inputText').addEventListener('input', generate);
document.getElementById('disclaimer').addEventListener('input', generate);

// Init disclaimer on load
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('disclaimerDisplay').textContent = document.getElementById('disclaimer').value;
});
</script>
</body>
</html>
